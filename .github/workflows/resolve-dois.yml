name: Enrich Data & Generate RO-Crate

# Trigger when data.json is pushed (typically from the GAS dashboard export)
on:
  push:
    paths:
      - 'data/data.json'
    branches:
      - main

# Prevent concurrent runs
concurrency:
  group: data-enrichment
  cancel-in-progress: true

jobs:
  enrich-and-generate:
    runs-on: ubuntu-latest

    # Skip if the push was made by this action (prevent infinite loop)
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve DOI metadata
        run: node scripts/resolve-dois.js

      - name: Generate RO-Crate metadata
        run: node scripts/generate-ro-crate.js

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/data.json ro-crate-metadata.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit enriched data and RO-Crate
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json ro-crate-metadata.json
          git commit -m "Auto-enrich: resolve DOIs and generate RO-Crate metadata"
          git push
